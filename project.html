<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Project — Portfolio</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    /* ---- RIPPLE OVERLAY ---- */
    #page-ripple {
      position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      background: var(--bg);
      clip-path: circle(150vmax at var(--rx, 50%) var(--ry, 50%));
    }
    #page-ripple.ripple-shrink {
      clip-path: circle(0px at var(--rx, 50%) var(--ry, 50%));
      transition: clip-path 0.62s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ---- PROJECT NAV ---- */
    .proj-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem; height: 60px;
      background: rgba(6,6,15,0.82); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .proj-nav-back {
      display: flex; align-items: center; gap: 0.5rem;
      color: var(--muted); text-decoration: none; font-size: 0.85rem;
      transition: color 0.2s; cursor: pointer; background: none; border: none;
    }
    .proj-nav-back:hover { color: var(--text); }
    .proj-nav-back::before { content: "←"; font-size: 1rem; }
    .proj-nav-title {
      font-family: var(--font-pixel); font-size: 0.55rem;
      color: var(--accent2); letter-spacing: 0.08em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 40vw;
    }
    .proj-nav-play {
      display: flex; gap: 0.5rem;
    }
    .proj-nav-play a {
      display: none; align-items: center; gap: 0.4rem;
      padding: 0.45rem 1rem; border-radius: 6px;
      font-family: var(--font-pixel); font-size: 0.5rem;
      text-decoration: none; transition: opacity 0.2s;
    }
    .proj-nav-play a.show { display: flex; }
    .proj-nav-play a.btn-primary { background: var(--accent); color: var(--bg); }
    .proj-nav-play a.btn-ghost { border: 1px solid var(--border-bright); color: var(--text); }

    /* ---- HERO ---- */
    .proj-hero {
      position: relative; min-height: 72vh;
      display: flex; align-items: flex-end;
      padding-top: 60px; overflow: hidden;
    }
    .proj-hero-bg {
      position: absolute; inset: 0; z-index: 0;
    }
    .proj-hero-bg canvas { width: 100%; height: 100%; }
    .proj-hero-image {
      position: absolute; inset: 0; z-index: 1;
    }
    .proj-hero-image img {
      width: 100%; height: 100%; object-fit: cover;
      opacity: 0.45;
    }
    .proj-hero-fade {
      position: absolute; bottom: 0; left: 0; right: 0; height: 55%; z-index: 2;
      background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
    }
    .proj-hero-content {
      position: relative; z-index: 3;
      width: 100%; max-width: 900px; margin: 0 auto;
      padding: 0 2.5rem 4rem;
    }
    .proj-status-badge {
      display: inline-block; margin-bottom: 1rem;
      font-family: var(--font-pixel); font-size: 0.42rem;
      padding: 0.35rem 0.7rem; border-radius: 3px; letter-spacing: 0.08em;
    }
    .proj-status-badge.released  { background: rgba(80,250,123,0.15); color: var(--green); border: 1px solid rgba(80,250,123,0.3); }
    .proj-status-badge.jam       { background: rgba(241,250,140,0.12); color: var(--yellow); border: 1px solid rgba(241,250,140,0.25); }
    .proj-status-badge.wip       { background: rgba(255,184,108,0.12); color: var(--orange); border: 1px solid rgba(255,184,108,0.25); }
    .proj-hero-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.1rem; }
    .proj-hero-tags .tag {
      background: rgba(189,147,249,0.12); border: 1px solid rgba(189,147,249,0.25);
      color: var(--accent2); font-family: var(--font-pixel); font-size: 0.42rem;
      padding: 0.3rem 0.6rem; border-radius: 3px; letter-spacing: 0.06em;
    }
    .proj-hero-title {
      font-family: var(--font-pixel); font-size: clamp(0.9rem, 3vw, 1.6rem);
      line-height: 1.4; margin-bottom: 1.5rem;
      text-shadow: 0 0 40px rgba(189,147,249,0.4);
    }
    .proj-meta-row {
      display: flex; flex-wrap: wrap; gap: 1.5rem;
    }
    .proj-meta-item {
      display: flex; flex-direction: column; gap: 0.2rem;
    }
    .proj-meta-label {
      font-family: var(--font-pixel); font-size: 0.34rem;
      color: var(--muted); letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .proj-meta-value {
      font-size: 0.92rem; color: var(--text); font-weight: 500;
    }

    /* ---- MAIN CONTENT ---- */
    .proj-main {
      max-width: 900px; margin: 0 auto; padding: 4rem 2.5rem 6rem;
    }

    .proj-section { margin-bottom: 4rem; }
    .proj-section-label {
      font-family: var(--font-pixel); font-size: 0.5rem;
      color: var(--accent); letter-spacing: 0.15em;
      margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem;
    }
    .proj-section-label::after {
      content: ""; flex: 1; height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    /* Description — two columns */
    .proj-description-text {
      font-size: 1.02rem; line-height: 1.9; color: var(--muted);
      column-count: 2; column-gap: 3rem;
      column-rule: 1px solid var(--border);
    }
    .proj-description-text p { margin-bottom: 1.1rem; break-inside: avoid; }

    /* ---- MEDIA COLLAGE ---- */
    #section-media {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 2rem 2.5rem;
    }
    .collage-header {
      max-width: 1100px; margin: 0 auto 1.5rem;
      padding: 0;
    }
    .media-collage {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: clamp(160px, 16vw, 220px);
      gap: 10px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .media-item {
      position: relative; overflow: hidden;
      background: var(--bg3);
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    /* mosaic size pattern — images */
    .media-item:nth-child(7n+1) { grid-column: span 2; grid-row: span 2; }
    .media-item:nth-child(7n+4) { grid-column: span 2; }
    .media-item:nth-child(7n+7) { grid-column: span 2; }
    /* videos: 2 cols × 2 rows so 16:9 fits */
    .media-item.is-video { grid-column: span 2; grid-row: span 2; }

    .media-item img {
      width: 100%; height: 100%; object-fit: cover;
      cursor: zoom-in; display: block;
      transition: transform 0.4s ease, filter 0.3s;
    }
    .media-item:hover img { transform: scale(1.05); filter: brightness(1.08); }

    .media-item.is-video iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    /* hover caption */
    .media-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 1.5rem 0.9rem 0.55rem;
      background: linear-gradient(to top, rgba(6,6,15,0.88) 0%, transparent 100%);
      font-size: 0.8rem; color: rgba(240,238,255,0.82);
      opacity: 0; transition: opacity 0.22s; pointer-events: none;
    }
    .media-item:hover .media-caption { opacity: 1; }

    /* lightbox */
    .proj-lb {
      position: fixed; inset: 0; z-index: 600;
      background: rgba(0,0,0,0.93);
      display: none; align-items: center; justify-content: center;
    }
    .proj-lb.open { display: flex; }
    .proj-lb img { max-width: 92vw; max-height: 90vh; border-radius: 8px; }
    .proj-lb-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: none; border: 1px solid var(--border-bright); color: var(--muted);
      padding: 0.4rem 0.85rem; border-radius: 6px; cursor: pointer;
      font-family: var(--font-pixel); font-size: 0.42rem; letter-spacing: 0.06em;
    }
    .proj-lb-close:hover { color: var(--text); border-color: var(--accent); }

    /* Google embed */
    .proj-google-wrap {
      position: relative; width: 100%;
      padding-bottom: 62%; height: 0;
      border-radius: 12px; overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg3);
    }
    .proj-google-wrap iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: none;
    }
    .proj-google-label {
      font-family: var(--font-pixel); font-size: 0.38rem;
      color: var(--muted); letter-spacing: 0.08em;
      margin-top: 0.6rem; text-align: right;
    }

    /* Links */
    .proj-links-row { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .proj-link-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.65rem 1.3rem; border-radius: 8px; text-decoration: none;
      font-family: var(--font-pixel); font-size: 0.52rem; letter-spacing: 0.04em;
      transition: all 0.2s;
    }
    .proj-link-btn.primary { background: var(--accent); color: var(--bg); }
    .proj-link-btn.primary:hover { opacity: 0.85; }
    .proj-link-btn.ghost { border: 1px solid var(--border-bright); color: var(--text); }
    .proj-link-btn.ghost:hover { border-color: var(--accent2); color: var(--accent2); }

    @media (max-width: 768px) {
      .media-collage { grid-template-columns: repeat(2, 1fr); }
      .media-item:nth-child(7n+1) { grid-column: span 2; grid-row: span 1; }
      .media-item.is-video { grid-column: span 2; grid-row: span 2; }
    }
    @media (max-width: 640px) {
      .proj-hero-content { padding: 0 1.25rem 3rem; }
      .proj-main { padding: 2.5rem 1.25rem 4rem; }
      .proj-nav { padding: 0 1.25rem; }
      #section-media { padding: 1.5rem 1rem; }
      .media-collage { grid-template-columns: repeat(2, 1fr); gap: 6px; }
      .media-item.is-video { grid-column: span 2; grid-row: span 2; }
      .proj-description-text { column-count: 1; }
    }
  </style>
</head>
<body>
<div id="page-ripple"></div>

<div class="proj-lb" id="proj-lb">
  <button class="proj-lb-close" onclick="closeLb()">✕ CLOSE</button>
  <img id="proj-lb-img" src="" alt=""/>
</div>

<nav class="proj-nav">
  <button class="proj-nav-back" onclick="goBack()">Back to Projects</button>
  <span class="proj-nav-title" id="proj-nav-title"></span>
  <div class="proj-nav-play" id="proj-nav-play"></div>
</nav>

<section class="proj-hero" id="proj-hero">
  <div class="proj-hero-bg">
    <canvas id="starfield"></canvas>
  </div>
  <div class="proj-hero-image" id="proj-hero-image" style="display:none;">
    <img id="proj-hero-img" src="" alt=""/>
  </div>
  <div class="proj-hero-fade"></div>
  <div class="proj-hero-content">
    <div id="proj-status-wrap"></div>
    <div class="proj-hero-tags" id="proj-tags"></div>
    <h1 class="proj-hero-title" id="proj-title">Loading...</h1>
    <div class="proj-meta-row" id="proj-meta"></div>
  </div>
</section>

<main class="proj-main">
  <section class="proj-section" id="section-desc" style="display:none;">
    <div class="proj-section-label">// ABOUT THIS PROJECT</div>
    <div class="proj-description-text" id="proj-desc-text"></div>
  </section>

  <section class="proj-section" id="section-google" style="display:none;">
    <div class="proj-section-label">// DOCUMENT</div>
    <div class="proj-google-wrap">
      <iframe id="proj-google-frame" src="" allowfullscreen
        allow="autoplay" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div>
    <p class="proj-google-label" id="proj-google-label"></p>
  </section>
</main>

<!-- Media collage — full-width, breaks out of proj-main constraint -->
<section id="section-media" style="display:none; margin-bottom:4rem;">
  <div class="collage-header">
    <div class="proj-section-label">// MEDIA</div>
  </div>
  <div class="media-collage" id="proj-media-collage"></div>
</section>

<main class="proj-main" style="padding-top:0;">
  <section class="proj-section" id="section-links" style="display:none;">
    <div class="proj-section-label">// LINKS</div>
    <div class="proj-links-row" id="proj-links-row"></div>
  </section>
</main>

<script src="js/main.js"></script>
<script>
(function() {
  // Reverse-ripple entry animation
  const ripple = document.getElementById("page-ripple");
  const stored = sessionStorage.getItem("ripple_origin");
  if (stored) {
    try {
      const {x, y} = JSON.parse(stored);
      ripple.style.setProperty("--rx", x + "px");
      ripple.style.setProperty("--ry", y + "px");
    } catch {}
    sessionStorage.removeItem("ripple_origin");
  }
  // Shrink the ripple away after paint
  requestAnimationFrame(() => requestAnimationFrame(() => {
    ripple.classList.add("ripple-shrink");
  }));

  // Load project data
  const params = new URLSearchParams(location.search);
  const projId = params.get("id");

  fetch("content.json", { cache: "no-cache" })
    .then(r => r.json())
    .then(data => {
      const proj = (data.projects || []).find(p => p.id === projId);
      if (!proj) { document.getElementById("proj-title").textContent = "Project not found"; return; }
      renderProject(proj);
    })
    .catch(() => {
      document.getElementById("proj-title").textContent = "Could not load project";
    });

  function renderProject(p) {
    document.getElementById("page-title").textContent = p.title + " — Portfolio";
    document.getElementById("proj-nav-title").textContent = p.title;
    document.getElementById("proj-title").textContent = p.title;

    // Status badge
    if (p.status) {
      const statusWrap = document.getElementById("proj-status-wrap");
      const cls = p.status.toLowerCase().includes("jam") ? "jam"
                : p.status.toLowerCase().includes("dev") || p.status.toLowerCase().includes("progress") ? "wip"
                : "released";
      statusWrap.innerHTML = `<span class="proj-status-badge ${cls}">${p.status.toUpperCase()}</span>`;
    }

    // Tags
    const tags = Array.isArray(p.tags) ? p.tags : (p.tags||"").split(",").map(t=>t.trim()).filter(Boolean);
    document.getElementById("proj-tags").innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join("");

    // Hero image
    if (p.image) {
      const heroImg = document.getElementById("proj-hero-image");
      document.getElementById("proj-hero-img").src = p.image;
      heroImg.style.display = "block";
    }

    // Meta row
    const metaItems = [
      p.year       && { label: "Year",      value: p.year },
      p.platform   && { label: "Platform",  value: p.platform },
      p.engine     && { label: "Engine",    value: p.engine },
      p.role       && { label: "My Role",   value: p.role },
      p.teamSize   && { label: "Team",      value: p.teamSize },
      p.duration   && { label: "Duration",  value: p.duration },
    ].filter(Boolean);
    document.getElementById("proj-meta").innerHTML = metaItems.map(m => `
      <div class="proj-meta-item">
        <span class="proj-meta-label">${m.label}</span>
        <span class="proj-meta-value">${m.value}</span>
      </div>`).join("");

    // Nav play buttons
    const navPlay = document.getElementById("proj-nav-play");
    if (p.playUrl) navPlay.innerHTML += `<a href="${p.playUrl}" target="_blank" class="btn-primary show">▶ Play</a>`;
    if (p.videoUrl) navPlay.innerHTML += `<a href="${p.videoUrl}" target="_blank" class="btn-ghost show">🎬 Trailer</a>`;

    // Full description
    const fullDesc = p.fullDescription || p.description || "";
    if (fullDesc) {
      document.getElementById("proj-desc-text").innerHTML =
        fullDesc.split(/\n\n+/).map(para => `<p>${para.replace(/\n/g, "<br>")}</p>`).join("");
      document.getElementById("section-desc").style.display = "block";
    }

    // Google embed (Slides, Drive, Doc, Sheet, Maps …)
    if (p.googleEmbed) {
      document.getElementById("proj-google-frame").src = p.googleEmbed;
      // Infer a friendly label from the URL
      const gu = p.googleEmbed;
      const glabel = gu.includes("presentation") ? "Google Slides"
                   : gu.includes("document")     ? "Google Docs"
                   : gu.includes("spreadsheets") ? "Google Sheets"
                   : gu.includes("forms")        ? "Google Forms"
                   : gu.includes("maps")         ? "Google Maps"
                   : "Google Drive";
      document.getElementById("proj-google-label").textContent = "↗ Open in " + glabel;
      document.getElementById("proj-google-label").style.cursor = "pointer";
      document.getElementById("proj-google-label").onclick = () => window.open(p.googleEmbed, "_blank");
      document.getElementById("section-google").style.display = "block";
    }

    // Media collage — combines images and videos (new schema) + legacy gallery/videoUrl
    const mediaItems = buildMediaItems(p);
    if (mediaItems.length) {
      document.getElementById("proj-media-collage").innerHTML = mediaItems.map(item => {
        if (item.type === "video") {
          const embedSrc = toEmbedUrl(item.url);
          return `<div class="media-item is-video">
            <iframe src="${embedSrc}" allowfullscreen
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"></iframe>
            ${item.caption ? `<div class="media-caption">${item.caption}</div>` : ""}
          </div>`;
        }
        const safe = item.url.replace(/'/g, "\\'");
        return `<div class="media-item" onclick="openLb('${safe}')">
          <img src="${item.url}" alt="${item.caption || ""}" loading="lazy"/>
          ${item.caption ? `<div class="media-caption">${item.caption}</div>` : ""}
        </div>`;
      }).join("");
      document.getElementById("section-media").style.display = "block";
    }

    // Links
    const links = [];
    if (p.playUrl)  links.push({ label: "▶ Play", url: p.playUrl, primary: true });
    if (p.extraLinks) {
      const extras = Array.isArray(p.extraLinks) ? p.extraLinks
        : p.extraLinks.split("\n").map(l => {
            const [label, url] = l.split("|").map(s => s.trim());
            return url ? { label, url } : null;
          }).filter(Boolean);
      links.push(...extras);
    }
    if (links.length) {
      document.getElementById("proj-links-row").innerHTML =
        links.map((l, i) => `<a href="${l.url}" target="_blank" class="proj-link-btn ${i === 0 && l.primary ? 'primary' : 'ghost'}">${l.label}</a>`).join("");
      document.getElementById("section-links").style.display = "block";
    }
  }

  // Convert any YouTube URL format to the embeddable /embed/ form.
  // Non-YouTube URLs (Vimeo, etc.) are returned unchanged.
  function toEmbedUrl(url) {
    if (!url) return url;
    if (url.includes("/embed/")) return url;                          // already embed
    const short  = url.match(/youtu\.be\/([^?&\s]+)/);               // youtu.be/ID
    if (short)  return `https://www.youtube.com/embed/${short[1]}`;
    const watch  = url.match(/[?&]v=([^?&\s]+)/);                    // ?v=ID
    if (watch)  return `https://www.youtube.com/embed/${watch[1]}`;
    const shorts = url.match(/youtube\.com\/shorts\/([^?&\s]+)/);     // /shorts/ID
    if (shorts) return `https://www.youtube.com/embed/${shorts[1]}`;
    return url;
  }

  // Build media items list from new `media` field + legacy `gallery` array + legacy `videoUrl`
  function buildMediaItems(p) {
    const items = [];
    // New unified media array
    if (Array.isArray(p.media) && p.media.length) {
      p.media.forEach(m => {
        if (typeof m === "string") {
          items.push({ type: "image", url: m });
        } else {
          const url = m.type === "video" ? toEmbedUrl(m.url) : m.url;
          items.push({ type: m.type || "image", url, caption: m.caption });
        }
      });
    } else {
      // Legacy: gallery (image URLs) + single videoUrl
      if (p.videoUrl) items.push({ type: "video", url: toEmbedUrl(p.videoUrl) });
      (Array.isArray(p.gallery) ? p.gallery : []).forEach(url => {
        if (typeof url === "string") items.push({ type: "image", url });
        else if (url && url.url) items.push({ type: url.type || "image", url: url.url, caption: url.caption });
      });
    }
    return items;
  }

  // Lightbox
  window.openLb = function(src) {
    document.getElementById("proj-lb-img").src = src;
    document.getElementById("proj-lb").classList.add("open");
  };
  window.closeLb = function() {
    document.getElementById("proj-lb").classList.remove("open");
  };
  document.getElementById("proj-lb").addEventListener("click", e => {
    if (e.target === e.currentTarget) closeLb();
  });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeLb(); });

  // Back navigation with ripple
  window.goBack = function() {
    const ripple = document.getElementById("page-ripple");
    ripple.style.setProperty("--rx", "50%");
    ripple.style.setProperty("--ry", "50%");
    // Reset to 0 instantly, then expand
    ripple.classList.remove("ripple-shrink");
    ripple.style.clipPath = "circle(0px at 50% 50%)";
    ripple.style.transition = "none";
    requestAnimationFrame(() => requestAnimationFrame(() => {
      ripple.style.transition = "clip-path 0.52s cubic-bezier(0.4, 0, 0.2, 1)";
      ripple.style.clipPath = "circle(150vmax at 50% 50%)";
    }));
    setTimeout(() => history.back(), 520);
  };
})();
</script>
</body>
</html>
